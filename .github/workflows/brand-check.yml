name: Brand Check
on: [push, pull_request]
jobs:
  brand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for old brand names
        run: |
          FOUND=0
          COUNT=$(grep -rn "DeciGraph\|decigraph" --include="*.py" . | grep -v node_modules | wc -l)
          if [ "$COUNT" -gt 0 ]; then echo "❌ $COUNT DeciGraph references in Python"; FOUND=1; fi
          COUNT=$(grep -rn "DeciGraph\|decigraph\|DECIGRAPH" --include="*.sh" . | wc -l)
          if [ "$COUNT" -gt 0 ]; then echo "❌ $COUNT DeciGraph references in shell"; FOUND=1; fi
          COUNT=$(grep -rn "dg_" --include="*.ts" packages/ | grep -v CHANGELOG | wc -l)
          if [ "$COUNT" -gt 0 ]; then echo "❌ $COUNT dg_ prefix references"; FOUND=1; fi
          COUNT=$(grep -rn "// .*──" --include="*.ts" --include="*.js" packages/*/src/ | wc -l)
          if [ "$COUNT" -gt 0 ]; then echo "❌ $COUNT em-dash comment dividers in source"; FOUND=1; fi
          if [ $FOUND -eq 1 ]; then echo "::error::Brand check failed — see above"; exit 1; fi
          echo "✅ Brand check passed"
